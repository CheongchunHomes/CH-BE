<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대출신청관리 | 관리자</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{admin/fragments/layout :: sidebar('loan')}"></aside>

    <main class="content">
        <section class="hero">
            <div>
                <div class="eyebrow">대출신청관리</div>
                <h2>대출신청 목록</h2>
                <p>결제대기, 결제승인, 결제거부 상태를 확인하고 처리 시간을 기록합니다.</p>
            </div>
            <div class="hero-actions">
                <span class="pill">실시간 반영</span>
                <a class="button ghost" href="/admin/loan">대출 목록</a>
            </div>
        </section>

        <section class="stats-grid two-column">
            <article class="card stat-card">
                <div class="label">신청 건수</div>
                <div class="value" th:text="${applicationCount}">0</div>
                <div class="meta">전체</div>
            </article>
            <article class="card stat-card">
                <div class="label">기본 상태</div>
                <div class="value">결제대기</div>
                <div class="meta">대기 상태</div>
            </article>
        </section>

        <section class="table-panel">
            <div class="table-head">
                <div>
                    <h3>대출신청 리스트</h3>
                    <p>상태를 결제대기 / 결제승인 / 결제거부로 관리하며, 승인 또는 거부 처리 시간을 기록합니다.</p>
                </div>
                <span class="pill">총 <span th:text="${applicationCount}">0</span>건</span>
            </div>

            <div class="table-scroll" th:if="${!#lists.isEmpty(applications)}">
                <table class="table-wide">
                    <thead>
                    <tr>
                        <th>신청ID</th>
                        <th>회원</th>
                        <th>상품</th>
                        <th>신청금액(만원)</th>
                        <th>상태</th>
                        <th>신청일</th>
                        <th>처리일</th>
                        <th>상태변경</th>
                        <th>미리보기</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="loanApplication : ${applications}">
                        <td th:text="${loanApplication.applicationId}">1</td>
                        <td>
                            <div th:text="${loanApplication.user != null ? loanApplication.user.nickname : '-'}">nickname</div>
                            <div class="subtext" th:text="${loanApplication.user != null ? loanApplication.user.email : '-'}">email@example.com</div>
                        </td>
                        <td>
                            <div th:text="${loanApplication.loanProduct != null ? loanApplication.loanProduct.name : '-'}">상품명</div>
                            <div class="subtext" th:text="${loanApplication.loanProduct != null ? loanApplication.loanProduct.provider : '-'}">기관명</div>
                        </td>
                        <td th:text="${loanApplication.applyAmount != null ? loanApplication.applyAmount + '' : '-'}">0</td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${loanApplication.status.name() == 'PAYMENT_APPROVED'} ? ' status-approved' : (${loanApplication.status.name() == 'PAYMENT_REJECTED'} ? ' status-rejected' : ' status-pending')"
                                  th:text="${loanApplication.status.dbValue}">결제대기</span>
                        </td>
                        <td th:text="${loanApplication.createdAt}">-</td>
                        <td th:text="${loanApplication.decisionAt != null ? loanApplication.decisionAt : '-'}">-</td>
                        <td>
                            <form class="status-form" th:action="@{/admin/loan-applications/{applicationId}/status(applicationId=${loanApplication.applicationId})}" method="post">
                                <select name="status">
                                    <option th:each="status : ${statusOptions}"
                                            th:value="${status.name()}"
                                            th:text="${status.dbValue}"
                                            th:selected="${status == loanApplication.status}"></option>
                                </select>
                                <button type="submit">변경</button>
                            </form>
                        </td>
                        <td>
                            <button type="button"
                                    class="button ghost"
                                    th:attr="data-preview-url=@{/admin/loan-applications/{applicationId}/contract-preview(applicationId=${loanApplication.applicationId})}"
                                    onclick="openContractPreview(this)">
                                미리보기
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${#lists.isEmpty(applications)}">
                대출신청이 없습니다.
            </div>
        </section>
    </main>
</div>
<script>
    async function openContractPreview(button) {
        const url = button?.dataset?.previewUrl;
        if (!url) {
            alert("미리보기 경로를 찾을 수 없습니다.");
            return;
        }

        button.disabled = true;
        const originalText = button.textContent;
        button.textContent = "불러오는 중...";

        try {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`미리보기 요청 실패: ${response.status}`);
            }

            const data = await response.json();
            if (!data?.signedUrl) {
                throw new Error("미리보기 URL이 없습니다.");
            }

            window.open(data.signedUrl, "_blank", "noopener,noreferrer");
        } catch (error) {
            console.error(error);
            alert(error instanceof Error ? error.message : "미리보기를 불러오지 못했습니다.");
        } finally {
            button.disabled = false;
            button.textContent = originalText ?? "미리보기";
        }
    }
</script>
</body>
</html>
