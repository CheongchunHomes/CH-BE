<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? '배너 수정' : '배너 등록'">배너 등록</title>
    <link rel="stylesheet" th:href="@{/admin/css/admin.css}">
    <style>
        .form-col-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-col-left .form-group:last-child textarea {
            min-height: 180px;
            resize: vertical;
        }
        input[type="datetime-local"] {
            height: 46px;
            min-width: 0;
        }
    </style>
</head>
<body>
<div class="layout">

    <aside th:replace="~{admin/fragments/layout :: sidebar('banner')}"></aside>

    <main class="content">

        <section class="hero">
            <div>
                <div class="eyebrow">배너 관리</div>
                <h2 th:text="${isEdit} ? '배너 수정' : '배너 등록'">배너 등록</h2>
                <p th:text="${isEdit} ? '등록된 배너 정보를 수정합니다.' : '메인 화면에 게시할 배너를 등록합니다. 게시 기간을 설정하면 자동으로 게시·종료됩니다.'">
                    메인 화면에 게시할 배너를 등록합니다.
                </p>
            </div>
        </section>

        <div class="form-panel">
            <form th:action="${isEdit} ? @{/admin/banners/{id}/edit(id=${bannerId})} : @{/admin/banners/new}"
                  method="post"
                  th:object="${dto}">

                <!-- 상단: 연결 공지 선택 (전체 너비) -->
                <div class="form-grid" style="margin-bottom:20px;">
                    <div class="form-group full">
                        <label>연결 공지 선택</label>
                        <select id="noticeSelect" th:field="*{noticeId}">
                            <option value="">선택 안 함</option>
                            <option th:each="notice : ${notices}"
                                    th:value="${notice.noticeId}"
                                    th:attr="data-title=${notice.title}, data-summary=${notice.summary}"
                                    th:disabled="${usedNoticeIds.contains(notice.noticeId)}"
                                    th:text="${usedNoticeIds.contains(notice.noticeId)} ? '[게시중] ' + ${#temporals.format(notice.createdAt, 'MM.dd')} + ' | ' + ${notice.title} : ${#temporals.format(notice.createdAt, 'MM.dd')} + ' | ' + ${notice.title}">
                            </option>
                        </select>
                    </div>
                </div>

                <!-- 하단: 2컬럼 -->
                <div class="form-grid">

                    <!-- 왼쪽: 배너 명칭 + 내용 요약 -->
                    <div class="form-col-left">
                        <div class="form-group">
                            <label>배너 명칭 *</label>
                            <input type="text" th:field="*{title}" id="titleInput"
                                   placeholder="예) 2025 청년 행복주택 모집 공고" required>
                            <span th:if="${#fields.hasErrors('title')}"
                                  th:errors="*{title}"
                                  style="color:var(--red); font-size:12px;"></span>
                        </div>
                        <div class="form-group">
                            <label>내용 요약</label>
                            <textarea th:field="*{content}" id="contentInput"
                                      placeholder="공지 선택 시 자동입력되거나 직접 입력하세요."></textarea>
                        </div>
                    </div>

                    <!-- 오른쪽: 기간 + 순서/게시 -->
                    <div style="display:flex; flex-direction:column; gap:20px;">
                        <div class="form-group">
                            <label>이동 링크 URL</label>
                            <select th:field="*{linkUrl}">
                                <option value="">선택 안 함</option>
                                <option value="/site/announcements">공고 페이지</option>
                                <option value="/site/policies">제도 페이지</option>
                                <option value="/site/simulator">시뮬레이터</option>
                                <option value="/site/loan">대출</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>게시 시작 일시 *</label>
                            <input type="datetime-local" th:field="*{startDate}" required>
                            <span th:if="${#fields.hasErrors('startDate')}"
                                  th:errors="*{startDate}"
                                  style="color:var(--red); font-size:12px;"></span>
                        </div>

                        <div class="form-group">
                            <label>게시 종료 일시 *</label>
                            <input type="datetime-local" th:field="*{endDate}" required>
                            <span th:if="${#fields.hasErrors('endDate')}"
                                  th:errors="*{endDate}"
                                  style="color:var(--red); font-size:12px;"></span>
                        </div>

                        <!-- 게시 순서 + 게시 설정 한 라인 -->
                        <div style="display:flex; gap:12px; align-items:flex-end;">
                            <div class="form-group" style="width:120px; flex-shrink:0;">
                                <label>게시 순서 *</label>
                                <input type="number" th:field="*{sortOrder}" min="1" required>
                                <span th:if="${#fields.hasErrors('sortOrder')}"
                                      th:errors="*{sortOrder}"
                                      style="color:var(--red); font-size:12px;"></span>
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>게시 설정</label>
                                <div class="radio-group">
                                    <label>
                                        <input type="radio" th:field="*{visible}" value="true"> 즉시 게시
                                    </label>
                                    <label>
                                        <input type="radio" th:field="*{visible}" value="false"> 숨김
                                    </label>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="form-actions">
                    <a class="button ghost" th:href="@{/admin/banners/list}">취소</a>
                    <button class="button" type="submit"
                            th:text="${isEdit} ? '수정 완료' : '배너 등록'">배너 등록</button>
                </div>

            </form>
        </div>

    </main>
</div>

<script>
    // 공지 선택 시 제목/내용 자동입력
    // data-title, data-summary 속성 읽기 (서버 요청 없음)
    document.getElementById('noticeSelect').addEventListener('change', function () {
        const selected = this.options[this.selectedIndex];
        const title = selected.dataset.title || '';
        const summary = selected.dataset.summary || '';

        if (title) {
            document.getElementById('titleInput').value = title;
            document.getElementById('contentInput').value = summary;
        } else {
            // 공지 연결 없음 선택 시 초기화
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
        }
    });
</script>
</body>
</html>
