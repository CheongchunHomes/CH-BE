<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대출상품 수정 | 관리자</title>
    <style>
        :root{
            --bg:#eef3ff;
            --card:#fff;
            --line:#d9e3f6;
            --text:#0f172a;
            --muted:#64748b;
            --blue:#2563eb;
            --blue-soft:#eaf1ff;
            --green:#10b981;
            --green-soft:#e7fbf2;
            --shadow:0 14px 42px rgba(15,23,42,.08);
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
            color:var(--text);
            background:linear-gradient(180deg,#f7f9ff 0%,var(--bg) 100%);
            min-height:100vh;
        }
        a{color:inherit;text-decoration:none}
        .layout{
            display:grid;
            grid-template-columns:260px 1fr;
            gap:24px;
            padding:24px;
            min-height:100vh;
        }
        .sidebar,.hero,.panel,.card{
            background:var(--card);
            border:1px solid var(--line);
            border-radius:24px;
            box-shadow:var(--shadow);
        }
        .sidebar{
            padding:22px 18px;
            display:flex;
            flex-direction:column;
            gap:18px;
            align-self:start;
        }
        .brand{
            display:flex;
            align-items:center;
            gap:12px;
            padding-bottom:12px;
            border-bottom:1px solid rgba(148,163,184,.25);
        }
        .brand-badge{
            width:44px;
            height:44px;
            border-radius:16px;
            display:grid;
            place-items:center;
            background:linear-gradient(135deg,#dbeafe,#eff6ff);
            color:var(--blue);
            font-weight:900;
            font-size:18px;
        }
        .brand h1{margin:0;font-size:19px;line-height:1.2}
        .brand p{margin:6px 0 0;font-size:12px;color:var(--muted)}
        .menu-title{font-size:12px;letter-spacing:.08em;color:var(--muted);font-weight:800;text-transform:uppercase}
        .menu-list{display:grid;gap:10px}
        .menu-item{
            padding:14px 16px;
            border-radius:16px;
            border:1px solid #dbe5ff;
            background:linear-gradient(180deg,#f7fbff 0%,#eef6ff 100%);
            display:grid;
            gap:4px;
        }
        .menu-item.active{
            background:linear-gradient(135deg,var(--blue),#4f7cff);
            color:#fff;
            border-color:transparent;
        }
        .menu-item.active span{color:rgba(255,255,255,.86)}
        .menu-item strong{font-size:15px}
        .menu-item span{font-size:12px;color:var(--muted)}
        .content{display:grid;gap:18px;align-content:start}
        .hero{
            padding:24px 28px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:20px;
        }
        .eyebrow{
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:8px 12px;
            border-radius:999px;
            background:var(--blue-soft);
            color:var(--blue);
            font-weight:800;
            font-size:13px;
            margin-bottom:10px;
        }
        .hero h2{margin:0;font-size:30px;line-height:1.15}
        .hero p{margin:8px 0 0;color:var(--muted);font-size:15px;line-height:1.7}
        .hero-actions{
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
            justify-content:flex-end;
        }
        .pill{
            padding:10px 14px;
            border-radius:999px;
            background:var(--green-soft);
            color:#059669;
            font-size:13px;
            font-weight:800;
        }
        .button{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            padding:12px 18px;
            border-radius:14px;
            background:linear-gradient(135deg,var(--blue),#4f7cff);
            color:#fff;
            font-weight:800;
            box-shadow:0 10px 24px rgba(37,99,235,.18);
            border:none;
            cursor:pointer;
        }
        .button.ghost{
            background:#fff;
            color:var(--blue);
            border:1px solid #dbe5ff;
            box-shadow:none;
        }
        .panel{padding:24px}
        .panel h3{margin:0 0 8px;font-size:24px}
        .panel p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}
        .form-grid{
            display:grid;
            grid-template-columns:repeat(2,minmax(0,1fr));
            gap:14px;
            margin-top:18px;
        }
        .field{
            display:grid;
            gap:6px;
        }
        .field label{
            font-size:13px;
            color:#334155;
            font-weight:800;
        }
        .field input,.field textarea,.field select{
            width:100%;
            border:1px solid #dbe5ff;
            border-radius:14px;
            padding:12px 14px;
            font:inherit;
            background:#fff;
            outline:none;
        }
        .field textarea{min-height:90px;resize:vertical}
        .field input:focus,.field textarea:focus,.field select:focus{
            border-color:#7da2ff;
            box-shadow:0 0 0 3px rgba(37,99,235,.08);
        }
        .field.full{grid-column:1 / -1}
        .radio-row{
            display:grid;
            gap:12px;
            margin-top:18px;
        }
        .radio-group{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            align-items:center;
        }
        .radio-group label{
            display:inline-flex;
            align-items:center;
            gap:8px;
            padding:10px 12px;
            border:1px solid #dbe5ff;
            border-radius:14px;
            background:#f8fbff;
            font-size:14px;
            color:#334155;
        }
        .section-actions{
            display:flex;
            justify-content:flex-end;
            gap:10px;
            margin-top:18px;
        }
        @media (max-width:1200px){
            .layout{grid-template-columns:1fr}
            .form-grid{grid-template-columns:1fr}
            .hero{flex-direction:column;align-items:flex-start}
            .hero-actions{justify-content:flex-start}
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-badge">H</div>
            <div>
                <h1>관리자 메인</h1>
                <p>청년 주거 통합 관리</p>
            </div>
        </div>
        <div>
            <div class="menu-title">메뉴 리스트</div>
            <div class="menu-list">
                <a class="menu-item" th:classappend="${currentMenu == 'overview'} ? ' active' : ''" href="/admin">
                    <strong>관리자 메인</strong><span>전체 현황</span>
                </a>
                <a class="menu-item" href="/admin?section=users"><strong>유저</strong><span>유저 리스트</span></a>
                <a class="menu-item" href="/admin?section=subscription"><strong>청약</strong><span>청약 리스트</span></a>
                <a class="menu-item active" th:classappend="${currentMenu == 'loan'} ? ' active' : ''" href="/admin/loan">
                    <strong>대출</strong><span>대출 허브</span>
                </a>
                <a class="menu-item" href="/admin?section=announcement"><strong>공고</strong><span>공고 리스트</span></a>
                <a class="menu-item" href="/admin?section=asset"><strong>자산</strong><span>파일 관리</span></a>
                <a class="menu-item" href="/admin?section=community"><strong>커뮤니티</strong><span>게시글 관리</span></a>
                <a class="menu-item" href="/admin?section=simulation"><strong>시뮬레이션</strong><span>진단 / 계산</span></a>
                <a class="menu-item" href="/admin?section=settings"><strong>설정</strong><span>권한 / 시스템</span></a>
            </div>
        </div>
    </aside>

    <main class="content">
        <section class="hero">
            <div>
                <div class="eyebrow">대출상품 수정</div>
                <h2 th:text="${product.name}">대출상품</h2>
                <p>상품명, 제공기관, 유형, 금리, 한도, 정책 여부를 수정한 뒤 저장합니다. 모든 금액은 만원 단위입니다.</p>
            </div>
            <div class="hero-actions">
                <span class="pill">수정 화면</span>
                <a class="button ghost" href="/admin/loan-products">목록으로</a>
            </div>
        </section>

        <section class="panel">
            <h3>상품 정보 수정</h3>
            <p>상품명, 제공기관, 유형, 금리, 최저금리, 최대한도, 소득한도는 입력값으로 받고, 정책과 노출은 아래에서 선택합니다.</p>

            <form th:action="@{/admin/loan-products/{loanId}/edit(loanId=${product.loanId})}" method="post">
                <div class="form-grid">
                    <div class="field">
                        <label for="externalCode">외부코드</label>
                        <input id="externalCode" name="externalCode" type="text" th:value="${product.externalCode}" required>
                    </div>
                    <div class="field">
                        <label for="provider">제공기관</label>
                        <input id="provider" name="provider" type="text" th:value="${product.provider}" required>
                    </div>
                    <div class="field">
                        <label for="name">상품명</label>
                        <input id="name" name="name" type="text" th:value="${product.name}" required>
                    </div>
                    <div class="field">
                        <label for="loanType">유형</label>
                        <input id="loanType" name="loanType" type="text" th:value="${product.loanType}" required>
                    </div>
                    <div class="field">
                        <label for="interestRate">금리(%)</label>
                        <input id="interestRate" name="interestRate" type="number" step="0.001" th:value="${product.interestRate}">
                    </div>
                    <div class="field">
                        <label for="interestRateMin">최저금리(%)</label>
                        <input id="interestRateMin" name="interestRateMin" type="number" step="0.001" th:value="${product.interestRateMin}">
                    </div>
                    <div class="field">
                        <label for="maxAmount">최대한도(만원)</label>
                        <input id="maxAmount" name="maxAmount" type="number" th:value="${product.maxAmount}">
                    </div>
                    <div class="field">
                        <label for="incomeLimit">소득한도(만원)</label>
                        <input id="incomeLimit" name="incomeLimit" type="number" th:value="${product.incomeLimit}">
                    </div>
                    <div class="field full">
                        <label for="conditions">조건</label>
                        <textarea id="conditions" name="conditions" th:text="${product.conditions}"></textarea>
                    </div>
                </div>

                <div class="radio-row">
                    <div>
                        <div style="font-size:13px;font-weight:800;color:#334155;margin-bottom:8px;">정책대출</div>
                        <div class="radio-group">
                            <label><input type="radio" name="policyLoan" value="true" th:checked="${product.policyLoan}"> 예</label>
                            <label><input type="radio" name="policyLoan" value="false" th:checked="${product.policyLoan == null or !product.policyLoan}"> 아니오</label>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:13px;font-weight:800;color:#334155;margin-bottom:8px;">노출</div>
                        <div class="radio-group">
                            <label><input type="radio" name="visible" value="true" th:checked="${product.visible}"> 예</label>
                            <label><input type="radio" name="visible" value="false" th:checked="${product.visible == null or !product.visible}"> 아니오</label>
                        </div>
                    </div>
                </div>

                <div class="section-actions">
                    <a class="button ghost" href="/admin/loan-products">취소</a>
                    <button class="button" type="submit">수정 저장</button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
