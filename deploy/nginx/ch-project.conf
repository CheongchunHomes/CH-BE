map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Real-IP $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Current CH-FE uses Next.js app/api routes for auth cookies and backend proxying.
    # Therefore /api must reach the frontend container first.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
    }

    # Browser calls /ai-api/api/chat. The trailing slash strips /ai-api before FastAPI.
    location /ai-api/ {
        proxy_pass http://127.0.0.1:8000/;
    }

    # Optional: enable only after Jenkins is configured to receive GitHub webhooks.
    # location /github-webhook/ {
    #     proxy_pass http://127.0.0.1:8080/github-webhook/;
    # }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
