services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: ch-jenkins:local
    container_name: myapp-jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins-home:
